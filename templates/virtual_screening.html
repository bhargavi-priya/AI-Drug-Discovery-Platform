<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Virtual Screening</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

<nav>

<h1>🧬 AI Drug Discovery</h1>

<ul>
<li><a href="/">Home</a></li>
<li><a href="/virtual_screening">Virtual Screening</a></li>
<li><a href="/drug_library">Drug Library</a></li>
<li><a href="/about">About</a></li>
</ul>

</nav>

</header>

<section class="hero">

<h2>Virtual Screening</h2>

<p>

Upload a protein sequence and a drug molecule to perform
AI-assisted drug analysis.

</p>

<br>

<div class="upload-card">

<form
action="/predict"
method="POST"
enctype="multipart/form-data">

<h3>🧬 Upload Protein File</h3>

<input
type="file"
name="protein_file"
accept=".fasta,.pdb"
required>

<br><br>

<h3>💊 Upload Drug File</h3>

<input
type="file"
name="drug_file"
accept=".sdf,.mol,.mol2,.pdb"
required>

<br><br><br>

<button type="submit">

🚀 Analyze Drug Candidate

</button>

</form>

</div>

</section>

<footer>

<p>

AI Drug Discovery Platform © 2026

</p>

</footer>

</body>

</html>
